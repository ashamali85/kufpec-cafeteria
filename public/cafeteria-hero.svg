<svg width="720" height="540" viewBox="0 0 720 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KUFPEC cafeteria illustration">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b67d5"/>
      <stop offset="1" stop-color="#0a3d91"/>
    </linearGradient>
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9f0f7"/>
    </linearGradient>
    <linearGradient id="cup" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f86e0"/>
      <stop offset="1" stop-color="#1b67d5"/>
    </linearGradient>
    <linearGradient id="plate" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dff0ff"/>
      <stop offset="1" stop-color="#c8e3f8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0a2e66" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="720" height="540" rx="28" fill="url(#sky)"/>
  <circle cx="600" cy="110" r="150" fill="#ffffff" opacity="0.06"/>
  <circle cx="120" cy="430" r="120" fill="#ffffff" opacity="0.05"/>

  <!-- window arches (cafeteria ambience) -->
  <g opacity="0.16" fill="#ffffff">
    <rect x="70" y="70" width="80" height="150" rx="40"/>
    <rect x="170" y="70" width="80" height="150" rx="40"/>
    <rect x="470" y="70" width="80" height="150" rx="40"/>
    <rect x="570" y="70" width="80" height="150" rx="40"/>
  </g>

  <!-- steam -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round" opacity="0.5" fill="none">
    <path d="M300 232 q-12 -22 0 -44 q12 -22 0 -44"/>
    <path d="M330 232 q-12 -22 0 -44 q12 -22 0 -44"/>
  </g>

  <!-- table surface -->
  <ellipse cx="360" cy="400" rx="320" ry="70" fill="#0a2e66" opacity="0.25"/>
  <rect x="60" y="330" width="600" height="120" rx="24" fill="url(#table)" filter="url(#soft)"/>

  <!-- coffee cup -->
  <g filter="url(#soft)">
    <path d="M270 250 h70 a14 14 0 0 1 14 14 v40 a44 44 0 0 1 -44 44 h-10 a44 44 0 0 1 -44 -44 v-40 a14 14 0 0 1 14 -14 z" fill="url(#cup)"/>
    <path d="M354 268 h18 a26 26 0 0 1 0 52 h-6" stroke="#1b67d5" stroke-width="12" fill="none" stroke-linecap="round"/>
    <ellipse cx="312" cy="262" rx="42" ry="12" fill="#0a2e66" opacity="0.35"/>
  </g>

  <!-- plate with sandwich -->
  <g filter="url(#soft)">
    <ellipse cx="480" cy="330" rx="92" ry="30" fill="url(#plate)"/>
    <ellipse cx="480" cy="324" rx="64" ry="18" fill="#ffffff"/>
    <!-- sandwich -->
    <path d="M442 318 l38 -26 l38 26 z" fill="#f3b54a"/>
    <rect x="444" y="316" width="72" height="12" rx="6" fill="#e98a3c"/>
    <rect x="446" y="324" width="68" height="8" rx="4" fill="#7fc08a"/>
  </g>

  <!-- juice glass -->
  <g filter="url(#soft)">
    <path d="M150 286 h54 l-7 70 a20 20 0 0 1 -20 18 h0 a20 20 0 0 1 -20 -18 z" fill="#ffd27a"/>
    <path d="M150 286 h54 l-2 20 h-50 z" fill="#ffba49"/>
    <ellipse cx="177" cy="286" rx="27" ry="7" fill="#fff4d6"/>
  </g>

  <!-- floating brand orb echoing the KUFPEC mark -->
  <g transform="translate(556 360)">
    <circle r="34" fill="#ffffff" opacity="0.95"/>
    <path d="M-14 -10 a18 18 0 1 0 0 20 a12 12 0 1 1 0 -20 z" fill="#0a3d91"/>
    <circle cx="6" cy="0" r="9" fill="#2f86e0"/>
  </g>
</svg>
